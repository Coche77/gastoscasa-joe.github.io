<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Casa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 900px; position: relative; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 3px solid #27ae60; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input { width: 110px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-size: 14px; background-color: #fff9e6; }
        .res-val { font-weight: bold; text-align: right; color: #34495e; }
        .total-row { background-color: #e8f5e9; font-weight: bold; font-size: 1.1em; border-top: 2px solid #27ae60; }
        .name-header { color: #27ae60; }
        .status-save { position: absolute; top: 10px; right: 20px; font-size: 12px; color: #27ae60; display: none; }
        .btn-clear { margin-top: 20px; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <span id="save-msg" class="status-save">✔ Guardado</span>
    <h2>🏠 Gastos Casa</h2>
    
    <table>
        <thead>
            <tr>
                <th>Concepto</th>
                <th>Importe Total ($)</th>
                <th class="name-header">JLRG</th>
                <th class="name-header">Baby</th>
                <th class="name-header">Joe</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo"></tbody>
        <tfoot>
            <tr class="total-row">
                <td>TOTAL A PAGAR</td>
                <td id="gran-total" style="text-align: right;">$0.00</td>
                <td id="total-jlrg" style="text-align: right;">$0.00</td>
                <td id="total-baby" style="text-align: right;">$0.00</td>
                <td id="total-joe" style="text-align: right;">$0.00</td>
            </tr>
        </tfoot>
    </table>
    <button class="btn-clear" onclick="limpiarTodo()">Borrar todo el mes</button>
</div>

<script>
    const conceptos = [
        { id: 'renta', nombre: 'Renta', inicial: 35000 },
        { id: 'agua', nombre: 'Agua', inicial: 0 },
        { id: 'luz', nombre: 'Luz', inicial: 0 },
        { id: 'gas', nombre: 'Gas', inicial: 0 },
        { id: 'izzy', nombre: 'Izzy', inicial: 648 },
        { id: 'heb', nombre: 'HEB', inicial: 5000 },
        { id: 'costco', nombre: 'Costco', inicial: 0 },
        { id: 'mela', nombre: 'Melaleuca', inicial: 1700 },
        { id: 'martha', nombre: 'Martha', inicial: 2000 },
        { id: 'varios', nombre: 'Varios', inicial: 0 }
    ];

    function format(n) {
        return '$' + n.toLocaleString('es-MX', {minimumFractionDigits: 2});
    }

    function calcular() {
        let totalGral = 0, tJLRG = 0, tBaby = 0, tJoe = 0;
        const savedData = {};

        conceptos.forEach((c, i) => {
            const val = parseFloat(document.getElementById(`in-${i}`).value) || 0;
            savedData[`in-${i}`] = val; // Guardamos para el localstorage

            let pJLRG, pBaby, pJoe;
            if (c.id === 'renta') {
                pJLRG = 15000;
                const remanente = val - 15000;
                pBaby = remanente / 2;
                pJoe = remanente / 2;
            } else {
                pJLRG = val / 3; pBaby = val / 3; pJoe = val / 3;
            }

            document.getElementById(`r1-${i}`).innerText = format(pJLRG);
            document.getElementById(`r2-${i}`).innerText = format(pBaby);
            document.getElementById(`r3-${i}`).innerText = format(pJoe);

            totalGral += val; tJLRG += pJLRG; tBaby += pBaby; tJoe += pJoe;
        });

        document.getElementById('gran-total').innerText = format(totalGral);
        document.getElementById('total-jlrg').innerText = format(tJLRG);
        document.getElementById('total-baby').innerText = format(tBaby);
        document.getElementById('total-joe').innerText = format(tJoe);

        // Guardar en la memoria del navegador
        localStorage.setItem('gastosCasaData', JSON.stringify(savedData));
        mostrarAviso();
    }

    function mostrarAviso() {
        const msg = document.getElementById('save-msg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 1000);
    }

    function limpiarTodo() {
        if(confirm("¿Seguro que quieres borrar todos los datos del mes?")) {
            localStorage.removeItem('gastosCasaData');
            location.reload();
        }
    }

    // Cargar datos al iniciar
    const cuerpo = document.getElementById('tabla-cuerpo');
    const datosRecuperados = JSON.parse(localStorage.getItem('gastosCasaData')) || {};

    conceptos.forEach((c, i) => {
        const valorFinal = datosRecuperados[`in-${i}`] !== undefined ? datosRecuperados[`in-${i}`] : c.inicial;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${c.nombre}</td>
            <td><input type="number" id="in-${i}" value="${valorFinal}" oninput="calcular()"></td>
            <td id="r1-${i}" class="res-val"></td>
            <td id="r2-${i}" class="res-val"></td>
            <td id="r3-${i}" class="res-val"></td>
        `;
        cuerpo.appendChild(tr);
    });

    calcular();
</script>

</body>
</html>
